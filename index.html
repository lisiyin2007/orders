<script>
  // ==================== 核心：客户端自动计算日期 ====================
  function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function fmtDisplay(d) { return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
  function weekdayCN(d) { return '星期' + ['日','一','二','三','四','五','六'][d.getDay()]; }
  function orderNo(d) { return '420000310920'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'1342033772'; }

  function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate()+n); return r; }

  var TODAY = new Date(); // 客户端本地日期

  // ==================== 渲染总览页 ====================
  function renderList() {
    var container = document.getElementById('order-list');
    var html = '';

    // ---- 今日未开始（置顶） ----
    var tn = orderNo(TODAY);
    var td = fmtDate(TODAY);
    html += '<div class="order-card" onclick="showDetail(\''+tn+'\',\''+td+'\',\'upcoming\')">'+
      '<div class="card-img"><div class="field-img"></div><div class="arrow-btn"><span>›</span></div></div>'+
      '<div class="card-body">'+
      '<div class="card-row shop-name">店铺：<span>门店名称</span></div>'+
      '<div class="card-row">订单状态：<span class="badge upcoming">未开始</span></div>'+
      '<div class="card-row time-row">订单时间：'+td+' 20:00</div>'+
      '</div>'+
      '<div class="card-qr"><div class="qr-icon"><div class="qr-grid"><div class="qr-sq"></div><div class="qr-sq"></div><div class="qr-sq"></div><div class="qr-sq"></div></div></div></div>'+
      '</div>';

    // ---- 历史订单（已过期） ----
    // 过去6个不同日期
    html += '<div class="order-card" style="min-height:28px;cursor:default;border-bottom:6px solid #f5f5f5"></div>';

    var historyOffsets = [1, 2, 3, 6, 22, 178];
    for (var i = 0; i < historyOffsets.length; i++) {
      var hd = addDays(TODAY, -historyOffsets[i]);
      var hn = orderNo(hd);
      var hdt = fmtDate(hd);
      html += '<div class="order-card" onclick="showDetail(\''+hn+'\',\''+hdt+'\',\'expired\')">'+
        '<div class="card-img"><div class="field-img"></div><div class="arrow-btn"><span>›</span></div></div>'+
        '<div class="card-body">'+
        '<div class="card-row shop-name">店铺：<span>门店名称</span></div>'+
        '<div class="card-row">订单状态：<span class="badge expired">已过期</span></div>'+
        '<div class="card-row time-row">订单时间：'+hdt+' 20:00</div>'+
        '</div>'+
        '<div class="card-qr"><div class="qr-icon"><div class="qr-grid"><div class="qr-sq"></div><div class="qr-sq"></div><div class="qr-sq"></div><div class="qr-sq"></div></div></div></div>'+
        '</div>';
    }

    container.innerHTML = html;
  }

  // ==================== 渲染详情页 ====================
  function showDetail(ordNo, dateStr, statusType) {
    document.getElementById('page-list').style.display = 'none';
    document.getElementById('page-detail').style.display = 'block';

    var isUpcoming = (statusType === 'upcoming');
    var btnClass = isUpcoming ? 'action-btn' : 'action-btn disabled';

    document.getElementById('detail-content').innerHTML =
      '<div class="detail-card">'+
      '<div class="detail-card-title">订单详情</div>'+
      '<div class="detail-row"><span>订单编号：</span><br><span style="word-break:break-all">'+ordNo+'</span></div>'+
      '<div class="detail-row" style="margin-top:8px"><span>订单门店：</span><span>天河时代E-PARK伸蓝智慧足球场</span></div>'+
      '<div class="detail-row" style="margin-top:8px"><span>订单类型：</span><span>包场订单</span></div>'+
      '<div class="detail-row" style="margin-top:8px"><span>开始时间：</span><span>'+dateStr+' 20:00</span></div>'+
      '<div class="detail-row" style="margin-top:8px"><span>结束时间：</span><span>'+dateStr+' 21:00</span></div>'+
      '</div>'+
      '<div class="btn-group">'+
      '<button class="'+btnClass+'">临时进场</button>'+
      '<button class="'+btnClass+'">临时出场</button>'+
      '<button class="'+btnClass+'">入场码</button>'+
      '<button class="'+btnClass+'">出场码</button>'+
      '</div>';

    window.scrollTo(0, 0);
  }

  function goBack() {
    document.getElementById('page-detail').style.display = 'none';
    document.getElementById('page-list').style.display = 'block';
    window.scrollTo(0, 0);
  }

  // 页面加载时自动渲染
  renderList();
</script>
</body>
</html>
